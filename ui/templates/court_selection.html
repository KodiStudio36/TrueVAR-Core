<!DOCTYPE html>
<html lang="en">

<head>
    <title>TrueVAR - Select Court</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-8">
    <div class="max-w-2xl mx-auto">

        <button onclick="window.location.href='/tournaments'"
            class="text-gray-500 hover:text-white text-sm mb-6 flex items-center gap-1">
            ← Back to tournaments
        </button>

        <h2 class="text-3xl font-bold mb-2 text-blue-400">Select Court</h2>
        <p id="tournamentTitle" class="text-gray-400 mb-8"></p>

        <div id="loading" class="text-gray-400">Loading courts...</div>
        <div id="courtGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>

        <div id="bootingOverlay" class="hidden fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
            <h2 class="text-2xl animate-pulse text-blue-400">Building Plugin Core...</h2>
        </div>

    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const tournamentId = params.get("tournament_id");
        const title = params.get("title") ?? "Tournament";

        async function init() {
            const key = localStorage.getItem("truevar_license");
            if (!key || !tournamentId) { window.location.href = "/"; return; }

            document.getElementById("tournamentTitle").innerText = title;

            const res = await fetch(`/api/system/tournaments/${tournamentId}/courts`);
            if (!res.ok) { window.location.href = "/tournaments"; return; }

            const data = await res.json();
            document.getElementById("loading").style.display = "none";

            const grid = document.getElementById("courtGrid");

            data.courts.forEach(courtId => {
                const btn = document.createElement("button");
                btn.className =
                    "bg-gray-800 p-6 rounded-lg text-center text-2xl font-bold border border-gray-700 " +
                    "hover:border-blue-500 hover:bg-gray-700 transition";
                btn.innerHTML = `Court<br><span class="text-blue-400">${courtId}</span>`;
                btn.onclick = () => bindAndBoot(courtId);
                grid.appendChild(btn);
            });
        }

        async function bindAndBoot(courtId) {
            const key = localStorage.getItem("truevar_license");
            document.getElementById("bootingOverlay").classList.remove("hidden");

            const res = await fetch("/api/system/boot", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    mode: "online",
                    tournament_id: tournamentId,
                    court_id: courtId,
                    license_key: key,
                }),
            });

            if (res.ok) {
                window.location.href = "/dashboard";
            } else {
                document.getElementById("bootingOverlay").classList.add("hidden");
                const err = await res.json();
                alert("Boot failed: " + JSON.stringify(err));
            }
        }

        init();
    </script>
</body>

</html>
